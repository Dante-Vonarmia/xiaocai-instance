{
  "allow_auto_replace": false,
  "replaceable_fields": ["产品/服务 说明","质量标准","验收口径","付款条款","评估项","权重","里程碑","输出物","输出格式"],
  "requires_user_confirmation": true,
  "reconciliation_policy": {
    "artifact_types": {
      "requirement": "requirements_document",
      "analysis": "analysis_report",
      "sourcing": "sourcing_result",
      "rfx": "rfx_strategy"
    },
    "field_rules": [
      {
        "field_key": "交付地点",
        "match_terms": ["地点", "交付地点", "服务地点", "收货地点", "城市", "举办城市"],
        "change_type": "field_value_update",
        "auto_apply": true,
        "artifact_actions": {
          "requirements_document": "patch",
          "analysis_report": "patch",
          "sourcing_result": "mark_stale",
          "rfx_strategy": "mark_stale"
        }
      },
      {
        "field_key": "预算金额",
        "match_terms": ["预算", "预算金额", "预算上限", "金额"],
        "value_terms": ["元", "万元", "万", "人民币"],
        "change_type": "field_value_update",
        "auto_apply": true,
        "artifact_actions": {
          "requirements_document": "patch",
          "analysis_report": "patch",
          "sourcing_result": "mark_stale",
          "rfx_strategy": "mark_stale"
        }
      },
      {
        "field_key": "数量",
        "match_terms": ["数量", "人数", "参与人数", "员工人数", "份数", "规模"],
        "value_terms": ["人", "名", "份", "个", "台"],
        "change_type": "field_value_update",
        "auto_apply": true,
        "decision": "needs_confirmation",
        "artifact_actions": {
          "requirements_document": "patch",
          "analysis_report": "patch",
          "sourcing_result": "mark_stale",
          "rfx_strategy": "mark_stale"
        }
      },
      {
        "field_key": "时间安排",
        "match_terms": ["时间", "日期", "时长", "周期", "活动时间", "举办时间", "交付时间"],
        "value_terms": ["天", "小时", "半天", "全天", "周", "月", "日"],
        "change_type": "field_value_update",
        "auto_apply": true,
        "artifact_actions": {
          "requirements_document": "patch",
          "analysis_report": "patch",
          "sourcing_result": "mark_stale",
          "rfx_strategy": "mark_stale"
        }
      },
      {
        "field_key": "产品/服务 说明",
        "match_terms": ["产品要求", "产品要求补充", "供应商要求", "供应商要求补充", "质量要求", "质量要求补充"],
        "value_markers": ["补充", "选择", "尽量选择", "优先选择", "要求"],
        "allow_text_value": true,
        "change_type": "field_value_update",
        "auto_apply": true,
        "artifact_actions": {
          "requirements_document": "patch",
          "analysis_report": "patch",
          "sourcing_result": "mark_stale",
          "rfx_strategy": "mark_stale"
        }
      },
      {
        "field_key": "范围约束",
        "match_terms": ["范围", "服务范围", "采购范围", "边界", "约束", "限制"],
        "change_type": "field_value_update",
        "auto_apply": true,
        "artifact_actions": {
          "requirements_document": "patch",
          "analysis_report": "patch",
          "sourcing_result": "mark_stale",
          "rfx_strategy": "mark_stale"
        }
      },
      {
        "field_key": "采购目的",
        "match_terms": ["采购目的", "目的", "核心目标", "业务目标"],
        "change_type": "purpose_change",
        "auto_apply": false,
        "decision": "needs_confirmation",
        "artifact_actions": {
          "requirements_document": "regenerate_recommended",
          "analysis_report": "regenerate_recommended",
          "rfx_strategy": "regenerate_recommended"
        }
      },
      {
        "field_key": "采购品类",
        "match_terms": ["品类", "类目", "一级品类", "二级品类"],
        "change_type": "category_change",
        "auto_apply": false,
        "decision": "needs_confirmation",
        "artifact_actions": {
          "requirements_document": "regenerate_recommended",
          "analysis_report": "regenerate_recommended",
          "sourcing_result": "mark_stale",
          "rfx_strategy": "regenerate_recommended"
        }
      }
    ]
  }
}
