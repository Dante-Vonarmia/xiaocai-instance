pack_id: activity_procurement
version: v1

artifact_spec_ref: shared.artifacts.artifact_specs

artifacts:
  - artifact_key: requirement_summary
    required_fields:
      - project_name
      - use_case
      - budget
      - delivery_time
      - delivery_location
      - activity_type
      - activity_scale
      - participant_count

  - artifact_key: structured_requirement
    required_fields:
      - project_name
      - requester
      - use_case
      - budget
      - quantity
      - delivery_location
      - delivery_time
      - activity_type
      - venue_info
      - setup_requirements
      - technical_requirements
      - execution_cycle

  - artifact_key: requirement_analysis
    required_fields:
      - project_name
      - budget
      - delivery_time
      - activity_type
      - participant_count
      - setup_requirements
      - technical_requirements

  - artifact_key: supplier_longlist
    required_fields:
      - supplier_region_preference
      - activity_type
      - activity_scale
      - delivery_location

  - artifact_key: supplier_shortlist
    required_fields:
      - supplier_longlist
      - supplier_scorecard_output

  - artifact_key: supplier_scorecard_output
    required_fields:
      - score_dimensions
      - hard_gates
      - veto_items

  - artifact_key: rfx_recommendation
    required_fields:
      - budget
      - urgency
      - compliance_requirements
      - activity_type
      - requirement_clarity

  - artifact_key: clarification_questions
    required_fields:
      - missing_fields
      - blocking_conditions

  - artifact_key: risk_notice
    required_fields:
      - risk_preference
      - technical_requirements
      - execution_cycle
      - supplier_shortlist
