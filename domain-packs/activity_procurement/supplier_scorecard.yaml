pack_id: activity_procurement
version: v1

shared_gate_ref: shared.suppliers.common_supplier_gate

hard_gates:
  - gate_id: ACT-GATE-001
    check: 主体合法且证照有效
  - gate_id: ACT-GATE-002
    check: 场景必要资质满足
  - gate_id: ACT-GATE-003
    check: 具备活动地履约能力
  - gate_id: ACT-GATE-004
    check: 无重大红线风险

bonus_items:
  - 本地化团队完备
  - 同类头部案例
  - 响应时效优于基线
  - 增值服务完整

score_dimensions:
  - key: compliance_and_qualification
    label: 合规与资质
    weight: 20
    score_range: [0, 20]
  - key: execution_and_delivery
    label: 执行与履约能力
    weight: 25
    score_range: [0, 25]
  - key: quality_safety_environment
    label: 质量/安全/环保保障
    weight: 20
    score_range: [0, 20]
  - key: commercial_terms
    label: 商务条件
    weight: 20
    score_range: [0, 20]
  - key: cases_and_value_added
    label: 案例与增值服务
    weight: 15
    score_range: [0, 15]

scoring_algorithm:
  total_score_formula: "sum(dimensions)"
  max_score: 100

veto_items:
  - 资质造假
  - 严重合规风险未披露
  - 关键条款拒绝承诺（交期/质保/赔付）

recommendation_levels:
  - level: 推荐
    condition: "hard_gates_passed and total_score >= 80"
  - level: 谨慎
    condition: "hard_gates_passed and total_score >= 60 and total_score < 80"
  - level: 淘汰
    condition: "not hard_gates_passed or total_score < 60 or veto_hit"
