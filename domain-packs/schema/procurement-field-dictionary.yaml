fields:
  - 字段名称: 项目名称
    业务含义: 本次采购项目的名称
    数据口径: 简洁明确不超过50字
    必填级别: 是
    示例值: 2026年办公设备采购项目
    类型_枚举_格式: 简洁明确不超过50字
    阶段归属:
      - 需求梳理
      - 需求分析
      - RFX策略
      - 智能检索
      - 智能寻源
  - 字段名称: 采购目的
    业务含义: 为什么要采购和希望解决什么问题
    数据口径: 描述业务背景和目标不超过200字
    必填级别: 是
    示例值: 支持新团队入驻并提升交付效率
    类型_枚举_格式: 描述业务背景和目标不超过200字
    阶段归属:
      - 需求梳理
      - 需求分析
      - RFX策略
      - 智能检索
      - 智能寻源
  - 字段名称: 需求提出人
    业务含义: 谁提出这个需求
    数据口径: 姓名或岗位
    必填级别: 是
    示例值: 行政经理
    类型_枚举_格式: 姓名或岗位
    阶段归属:
      - 需求梳理
      - 需求分析
      - RFX策略
      - 智能检索
      - 智能寻源
  - 字段名称: 需求来源
    业务含义: 该需求来自哪个部门？
    数据口径: 业务发起/管理层指令/合规整改/客户项目
    必填级别: 是
    示例值: 业务发起
    类型_枚举_格式: 业务发起/管理层指令/合规整改/客户项目
    阶段归属:
      - 需求梳理
      - 需求分析
      - RFX策略
      - 智能检索
      - 智能寻源
  - 字段名称: 使用场景
    业务含义: 采购结果将用于什么场景
    数据口径: 按实际业务场景描述
    必填级别: 是
    示例值: 新办公室日常办公
    类型_枚举_格式: 按实际业务场景描述
    阶段归属:
      - 需求梳理
      - 需求分析
      - RFX策略
      - 智能检索
      - 智能寻源
  - 字段名称: 影响范围（部门/区域）
    业务含义: 该需求影响哪些团队或区域
    数据口径: 部门/区域列表
    必填级别: 否
    示例值: 市场部 华东区
    类型_枚举_格式: 部门/区域列表
    阶段归属:
      - 需求梳理
      - 需求分析
      - RFX策略
      - 智能检索
      - 智能寻源
  - 字段名称: 一级品类
    业务含义: 采购的大类
    数据口径: 从一级品类目录选择
    必填级别: 是
    示例值: 办公设备
    类型_枚举_格式: 从一级品类目录选择
    阶段归属:
      - 需求梳理
      - 需求分析
      - RFX策略
      - 智能检索
      - 智能寻源
  - 字段名称: 二级品类
    业务含义: 采购的子类
    数据口径: 从二级品类目录选择
    必填级别: 是
    示例值: 办公电脑
    类型_枚举_格式: 从二级品类目录选择
    阶段归属:
      - 需求梳理
      - 需求分析
      - RFX策略
      - 智能检索
      - 智能寻源
  - 字段名称: 产品/服务
    业务含义: 更细的采购对象
    数据口径: 可自由填写或按目录选择
    必填级别: 否
    示例值: 轻薄本
    类型_枚举_格式: 可自由填写或按目录选择
    阶段归属:
      - 需求梳理
      - 需求分析
      - RFX策略
      - 智能检索
      - 智能寻源
  - 字段名称: 数量
    业务含义: 预计采购数量
    数据口径: 正整数
    必填级别: 是
    示例值: 100
    类型_枚举_格式: 正整数
    阶段归属:
      - 需求梳理
      - 需求分析
      - RFX策略
      - 智能检索
      - 智能寻源
  - 字段名称: 单位
    业务含义: 计量单位
    数据口径: 标准单位
    必填级别: 是
    示例值: 台
    类型_枚举_格式: 标准单位
    阶段归属:
      - 需求梳理
      - 需求分析
      - RFX策略
      - 智能检索
      - 智能寻源
  - 字段名称: 预算金额
    业务含义: 本次采购预算上限
    数据口径: 人民币金额（含税）
    必填级别: 是
    示例值: 500000
    类型_枚举_格式: 人民币金额（含税）
    阶段归属:
      - 需求梳理
      - 需求分析
      - RFX策略
      - 智能检索
      - 智能寻源
  - 字段名称: 预算币种
    业务含义: 预算所用币种
    数据口径: 标准币种代码
    必填级别: 是
    示例值: CNY
    类型_枚举_格式: 标准币种代码
    阶段归属:
      - 需求梳理
      - 需求分析
      - RFX策略
      - 智能检索
      - 智能寻源
  - 字段名称: 交付时间
    业务含义: 希望完成交付的时间
    数据口径: YYYY-MM-DD
    必填级别: 是
    示例值: 2026-05-31
    类型_枚举_格式: YYYY-MM-DD
    阶段归属:
      - 需求梳理
      - 需求分析
      - RFX策略
      - 智能检索
      - 智能寻源
  - 字段名称: 交付地点
    业务含义: 收货或服务地点
    数据口径: 详细地址
    必填级别: 是
    示例值: 北京市朝阳区xxx路xx号
    类型_枚举_格式: 详细地址
    阶段归属:
      - 需求梳理
      - 需求分析
      - RFX策略
      - 智能检索
      - 智能寻源
  - 字段名称: 响应时效
    业务含义: 从提交到首次方案反馈时限
    数据口径: 小时或工作日
    必填级别: 否
    示例值: 48小时内
    类型_枚举_格式: 小时或工作日
    阶段归属:
      - 需求梳理
      - 需求分析
      - RFX策略
      - 智能检索
      - 智能寻源
  - 字段名称: 交付方式
    业务含义: 一次交付或分批交付
    数据口径: 一次性/分批
    必填级别: 否
    示例值: 分2批交付
    类型_枚举_格式: 一次性/分批
    阶段归属:
      - 需求梳理
      - 需求分析
      - RFX策略
      - 智能检索
      - 智能寻源
  - 字段名称: 产品/服务 说明
    业务含义: 针对产品/服务，更加细致的关键功能与规格说明
    数据口径: 可分点描述，建议100-500字
    必填级别: 是
    示例值: 用于设计团队的高性能办公设备
    类型_枚举_格式: 可分点描述，建议100-500字
    阶段归属:
      - 需求分析
      - RFX策略
      - 智能检索
      - 智能寻源
  - 字段名称: 特殊要求
    业务含义: 安装实施或其他特殊要求
    数据口径: 按实际说明
    必填级别: 否
    示例值: 需现场安装调试并做初次培训
    类型_枚举_格式: 按实际说明
    阶段归属:
      - 需求分析
      - RFX策略
      - 智能检索
      - 智能寻源
  - 字段名称: 保密等级
