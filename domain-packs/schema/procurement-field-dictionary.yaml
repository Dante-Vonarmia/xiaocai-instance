    数据口径: 公开/内部/受限
    必填级别: 否
    示例值: 内部
    类型_枚举_格式: 公开/内部/受限
    阶段归属:
      - 需求分析
      - RFX策略
      - 智能检索
      - 智能寻源
  - 字段名称: 技术要求
    业务含义: 关键参数明细
    数据口径: 按条目填写
    必填级别: 否
    示例值: CPU i7/16GB/512GB SSD
    类型_枚举_格式: 按条目填写
    阶段归属:
      - 需求分析
      - RFX策略
      - 智能检索
      - 智能寻源
  - 字段名称: 质量标准
    业务含义: 质量验收标准
    数据口径: 可量化标准
