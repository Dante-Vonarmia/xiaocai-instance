    示例值: '同类项目年交付>=500台'
    类型_枚举_格式: 可量化要求
    阶段归属:
      - 智能寻源
  - 字段名称: 候选数量
    业务含义: 本轮计划邀请的供应商数量
    数据口径: 正整数
    必填级别: 否
    示例值: 8
    类型_枚举_格式: 正整数
    阶段归属:
      - 智能寻源
  - 字段名称: 供应商区域
    业务含义: 供应商地域限制
    数据口径: 全国/指定地区/本地优先
    必填级别: 否
    示例值: 华东优先
    类型_枚举_格式: 全国/指定地区/本地优先
    阶段归属:
      - 智能寻源
