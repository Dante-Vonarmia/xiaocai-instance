    类型_枚举_格式: 可执行的验收口径
    阶段归属:
      - 需求分析
      - RFX策略
      - 智能检索
      - 智能寻源
  - 字段名称: 风险等级
    业务含义: 该需求的整体风险等级
    数据口径: 高/中/低
    必填级别: 否
    示例值: 中
    类型_枚举_格式: 高/中/低
    阶段归属:
      - 需求分析
      - RFX策略
      - 智能检索
      - 智能寻源
  - 字段名称: 风险分析
