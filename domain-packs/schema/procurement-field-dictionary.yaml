    数据口径: 不超过200字
    必填级别: 否
    示例值: 交期不稳定导致项目延期
    类型_枚举_格式: 不超过200字
    阶段归属:
      - 需求分析
      - RFX策略
      - 智能检索
      - 智能寻源
  - 字段名称: 供应商资质
