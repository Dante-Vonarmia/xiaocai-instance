    业务含义: 未合作过供应商是否可参与
    数据口径: 是/否
    必填级别: 否
    示例值: 是
    类型_枚举_格式: 是/否
    阶段归属:
      - 智能寻源
  - 字段名称: RFX类型
    业务含义: 本次采购方式倾向
    数据口径: RFI/RFQ/RFP/RFB
    必填级别: 是
    示例值: RFQ
    类型_枚举_格式: RFI/RFQ/RFP/RFB
    阶段归属:
      - RFX策略
      - 智能检索
      - 智能寻源
  - 字段名称: 付款条款
    业务含义: 付款条件和账期
    数据口径: 按里程碑或账期描述
