# xiaocai 采购数据模式定义（字段引用版）
# 说明: 本文件只定义实体结构与字段引用，不重复字段口径定义
schema:
  name: procurement
  version: '1.0'
  field_dictionary_ref: 'schema/procurement-field-dictionary.yaml'
  key_mode: 中文字段名

stage_field_sets:
  最小必填集:
    - 项目名称
    - 采购目的
    - 需求提出人
    - 需求来源
    - 使用场景
    - 一级品类
    - 二级品类
    - 数量
    - 单位
    - 预算金额
    - 预算币种
    - 交付时间
    - 交付地点
    - 产品/服务 说明
    - 质量标准
    - 验收口径
    - RFX类型
    - 付款条款
    - 发票类型
    - 评估项
    - 权重
    - 里程碑
    - 决策人
    - 输出物
    - 输出格式
    - 统一社会信用代码
    - 营业执照文件
    - 纳税资质
    - 开票资料
    - 历史案例
    - 风险与诉讼
    - 对接人
    - 售后质保
    - 搜索关键词
    - 搜索范围
    - 结果标题
    - 信息来源
    - 结果摘要
    - 可信度
    - 公司名称
    - 主营品类
    - 所在地
    - 数据来源
    - PR编号
  需求梳理必填集:
    - 项目名称
    - 采购目的
    - 需求提出人
    - 需求来源
    - 使用场景
    - 一级品类
    - 二级品类
    - 数量
    - 单位
    - 预算金额
    - 预算币种
    - 交付时间
    - 交付地点
    - PR编号
  需求分析必填集:
    - 项目名称
    - 采购目的
    - 需求提出人
    - 需求来源
    - 使用场景
    - 一级品类
    - 二级品类
    - 数量
    - 单位
    - 预算金额
    - 预算币种
    - 交付时间
    - 交付地点
    - 产品/服务 说明
    - 质量标准
    - 验收口径
    - PR编号
  RFX策略必填集:
    - 项目名称
    - 采购目的
    - 需求提出人
    - 需求来源
    - 使用场景
    - 一级品类
    - 二级品类
    - 数量
    - 单位
    - 预算金额
    - 预算币种
    - 交付时间
    - 交付地点
    - 产品/服务 说明
    - 质量标准
    - 验收口径
    - RFX类型
    - 付款条款
    - 发票类型
    - 评估项
    - 权重
    - 里程碑
    - 决策人
    - 输出物
    - 输出格式
    - 统一社会信用代码
    - 营业执照文件
    - 纳税资质
    - 开票资料
    - 历史案例
    - 风险与诉讼
    - 售后质保
    - PR编号

completeness_rules:
  requirement_collection:
    pass_when: '需求梳理必填集全部完成'
    missing_fields_source: 'schema/procurement-field-dictionary.yaml#fields'
  requirement_analysis:
    pass_when: '需求分析必填集全部完成'
  rfx_strategy:
    pass_when: 'RFX策略必填集全部完成'

entities:
  Project:
    description: '采购项目（聚合对象）'
    field_refs:
      - PR编号
      - 项目名称
      - 采购目的
      - 需求来源
      - 需求提出人
      - 影响范围（部门/区域）
      - 采购目的
      - 输出物
      - 输出格式
      - 沉淀为案例
      - 知识库标签

  Requirement:
    description: '需求梳理与需求分析阶段的主对象'
    field_refs:
      - 采购目的
      - 使用场景
      - 一级品类
      - 二级品类
      - 产品/服务
      - 数量
      - 单位
      - 预算金额
      - 预算币种
      - 交付时间
      - 交付地点
      - 响应时效
      - 交付方式
      - 产品/服务 说明
      - 特殊要求
      - 保密等级
      - 技术要求
      - 质量标准
      - 验收口径
      - 风险等级
      - 风险分析
      - 附件

  Analysis:
    description: '需求分析输出对象'
    field_refs:
      - 质量标准
      - 验收口径
      - 风险等级
      - 风险分析
      - 谈判要点
      - 历史项目
      - 行业资料
      - 内部制度

  RFXStrategy:
    description: 'RFX策略对象'
    field_refs:
      - RFX类型
      - 付款条款
      - 发票类型
      - 关键条款
      - 评估项
      - 权重
      - 比价轮数
      - 里程碑
      - 决策人
      - 输出物
      - 输出格式

  SourcingContext:
    description: '后续智能检索与智能寻源上下文（首轮保留引用）'
    field_refs:
      - 供应商资质
      - 履约能力
      - 候选数量
      - 供应商区域
      - 允许新供应商
      - 统一社会信用代码
      - 营业执照文件
      - 法人
      - 成立日期
      - 注册资本
      - 纳税资质
      - 开票资料
      - 资质证书
      - 历史案例
      - 风险与诉讼
      - 对接人
      - 服务区域
      - 售后质保
      - 搜索关键词
      - 搜索范围
      - 结果标题
      - 信息来源
      - 结果摘要
      - 来源链接
      - 发布时间
      - 可信度
      - 公司名称
      - 成立年份
      - 经营范围
