pack_id: shared_clarification_relevance_rules
version: v1
scope: p0

defaults:
  ask_missing_fields_one_by_one: true
  low_relevance_action: defer_to_canvas
  maybe_relevant_action: suggest_not_force

field_roles:
  universal:
    - 采购目的
    - 使用场景
    - 一级品类
    - 二级品类
    - 预算金额
    - 交付时间
    - 交付地点
    - 产品/服务 说明
    - 质量标准
    - 验收口径

  canvas_preferred:
    - 项目名称
    - 需求来源
    - 需求提出人
    - 影响范围（部门/区域）

  template_conditional:
    - technical_requirements
    - setup_requirements
