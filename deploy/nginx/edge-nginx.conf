events {}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    server_tokens off;
    resolver 127.0.0.11 ipv6=off valid=10s;

    server {
        listen 80 default_server;
        server_name _;

        client_max_body_size 20m;

        location = /api {
            return 301 /api/;
        }

        location /api/ {
            set $xiaocai_api_upstream inst-xiaocai-api:8001;
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://$xiaocai_api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
        }

        location / {
            set $xiaocai_web_upstream inst-xiaocai-web:80;
            proxy_pass http://$xiaocai_web_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 80;
        server_name ai.tianxiaxi.vip;

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type text/plain;
            try_files $uri =404;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name ai.tianxiaxi.vip;

        ssl_certificate /etc/letsencrypt/live/ai.tianxiaxi.vip/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ai.tianxiaxi.vip/privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        client_max_body_size 20m;

        location = /api {
            return 301 /api/;
        }

        location /api/ {
            set $xiaocai_api_upstream inst-xiaocai-api:8001;
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://$xiaocai_api_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
        }

        location / {
            set $xiaocai_web_upstream inst-xiaocai-web:80;
            proxy_pass http://$xiaocai_web_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
