    - 预算金额
    - 交付时间
  blocker:
    should_trigger: true
    reason: 缺少验收口径和版权要求
  chooser:
    should_trigger: false
  search:
    target_fields:
      - 验收口径
      - 历史案例
      - 风险分析
    expected_query_intent: 验收标准检索
  replace:
    candidate_field: 验收口径
    decision_mode: recommend_only
  output_assertions:
    analysis_sections:
      - 项目理解与核心需求
      - 成本结构分析
      - 项目风险分析
    rfx_type: RFP
