scenario:
  id: scenario-travel-service-procurement
  name: 差旅服务采购
  category_path:
    一级品类: 差旅平台
    二级品类: /

input:
  user_message: 需要年度差旅平台服务，覆盖国内机酒预订，预算80万，要求对公结算与月度报表。
  attachments: []

expected:
  classification:
    一级品类: 差旅平台
    二级品类: /
  required_fields_present:
    - 采购目的
    - 一级品类
    - 二级品类
    - 产品/服务
    - 预算金额
    - 发票类型
    - 付款条款
  blocker:
    should_trigger: true
    reason: 缺少服务区域与验收口径
  chooser:
    should_trigger: false
  search:
    target_fields:
      - 服务区域
      - 验收口径
      - 供应商资质
    expected_query_intent: 供应商资质检索
  replace:
    candidate_field: 服务区域
    decision_mode: user_confirm_required
  output_assertions:
    analysis_sections:
      - 市场现状和分析
      - 采购策略分析
      - 项目实施计划与执行建议
    rfx_type: RFB
